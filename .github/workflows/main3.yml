name: Cheat Engine (auto‑filtered full build)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      CONFIG: Release

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # ---------------------------------------------------------
    # Install Lazarus + FPC
    # ---------------------------------------------------------
    - name: Install Lazarus + FPC
      shell: pwsh
      run: |
        $url = "https://sourceforge.net/projects/lazarus/files/Lazarus%20Windows%2064%20bits/Lazarus%203.4/lazarus-3.4-fpc-3.2.2-win64.exe/download"
        $installer = "$env:RUNNER_TEMP\\lazarus_installer.exe"
        curl.exe -L $url -o $installer

        # Verify EXE header
        $bytes = [System.IO.File]::ReadAllBytes($installer)[0..1]
        if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
          Write-Error "Invalid Lazarus installer (not an EXE)"
          exit 1
        }

        Start-Process -FilePath $installer -ArgumentList "/VERYSILENT" -Wait

    # ---------------------------------------------------------
    # Install Windows Driver Kit (WDK)
    # ---------------------------------------------------------
    - name: Install Windows Driver Kit
      shell: pwsh
      run: |
        $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2128854"
        $wdkInstaller = "$env:RUNNER_TEMP\\wdksetup.exe"
        curl.exe -L $wdkUrl -o $wdkInstaller
        Start-Process -FilePath $wdkInstaller -ArgumentList "/quiet" -Wait

    # ---------------------------------------------------------
    # Auto‑filter and build .sln files (deny‑list)
    # ---------------------------------------------------------
    - name: Auto‑filter and build .sln files
      shell: pwsh
      run: |
        $deny = @(
          "CUDA pointerscan",
          "Direct x mess",
          "DotNetCompiler",
          "DotNetDataCollector",
          "DotNetInvasiveDataCollector",
          "Java\\CEJVMTI",
          "lua53\\lua53\\vs2013",
          "MonoDataCollector",
          "plugin\\c# template",
          "plugin\\example-c",
          "plugin\\QWS",
          "tcclib\\win32\\tcc",
          "lua\\mak.vs2005",
          "lua\\mak.vs2008",
          "ultimap2",
          "DBKKernel"
        )

        $solutions = Get-ChildItem -Recurse -Filter *.sln
        $buildable = @()

        foreach ($sln in $solutions) {
          $path = $sln.FullName
          foreach ($bad in $deny) {
            if ($path -like "*$bad*") {
              Write-Warning "Skipping unsupported SLN: $path"
              continue 2
            }
          }
          Write-Host "✓ SLN buildable: $path"
          $buildable += $path
        }

        foreach ($sln in $buildable) {
          Write-Host "Building $sln"
          msbuild $sln /p:Configuration=$env:CONFIG /m
        }

    # ---------------------------------------------------------
    # Build Lazarus projects (.lpi) — Win64 only + deny‑list
    # ---------------------------------------------------------
    - name: Build Lazarus projects
      shell: pwsh
      run: |
        # Add FPC to PATH
        $env:PATH = "C:\lazarus\fpc\3.2.2\bin\x86_64-win64;$env:PATH"

        $lazbuild = "C:\Lazarus\lazbuild.exe"

        # Lazarus deny‑list (Android, Win32-only, ARM, etc.)
        $denyLPI = @(
          "cecore.lpi",                # Android ARM
          "ceregreset.lpi",            # Win32 only
          "Kernelmoduleunloader.lpi",  # Win32 only
          "standalonephase2.lpi",      # Win32 only
          "speedhack.lpi"              # Win32 only
        )

        Get-ChildItem -Recurse -Filter *.lpi | ForEach-Object {
          $path = $_.FullName

          foreach ($bad in $denyLPI) {
            if ($path -like "*$bad*") {
              Write-Warning "Skipping unsupported LPI: $path"
              continue 2
            }
          }

          Write-Host "✓ LPI buildable: $path"
          & $lazbuild --cpu=x86_64 --os=win64 --build-all $path
        }

    # ---------------------------------------------------------
    # Install ISCC.exe (official Inno Setup compiler)
    # ---------------------------------------------------------
    - name: Install Inno Setup Compiler
      shell: pwsh
      run: |
        $url = "https://github.com/jrsoftware/issrc/raw/master/Output/ISCC.exe"
        $iscc = "$env:RUNNER_TEMP\\ISCC.exe"

        curl.exe --fail --location --output $iscc $url

        # Verify EXE header (MZ)
        $bytes = [System.IO.File]::ReadAllBytes($iscc)[0..1]
        if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
          Write-Error "ISCC.exe is not a valid EXE"
          exit 1
        }

        echo "ISCC=$iscc" >> $env:GITHUB_ENV

    # ---------------------------------------------------------
    # Build installer
    # ---------------------------------------------------------
    - name: Build installer
      shell: pwsh
      run: |
        & $env:ISCC "Cheat Engine\installer\CheatEngine.iss"

    # ---------------------------------------------------------
    # Upload artifacts
    # ---------------------------------------------------------
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cheat-engine-auto-filtered-build
        path: |
          Cheat Engine/bin
          Cheat Engine/installer/Output
          **/*.exe
          **/*.dll
          **/*.sys
