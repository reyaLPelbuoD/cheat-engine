name: Cheat Engine (portable build)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      CONFIG: Release

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # ---------------------------------------------------------
    # Install Lazarus + FPC
    # ---------------------------------------------------------
    - name: Install Lazarus + FPC
      shell: pwsh
      run: |
        $url = "https://sourceforge.net/projects/lazarus/files/Lazarus%20Windows%2064%20bits/Lazarus%203.4/lazarus-3.4-fpc-3.2.2-win64.exe/download"
        $installer = "$env:RUNNER_TEMP\\lazarus_installer.exe"
        curl.exe -L $url -o $installer

        $bytes = [System.IO.File]::ReadAllBytes($installer)[0..1]
        if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) { exit 1 }

        Start-Process -FilePath $installer -ArgumentList "/VERYSILENT" -Wait

    # ---------------------------------------------------------
    # Install Windows Driver Kit (WDK)
    # ---------------------------------------------------------
    - name: Install Windows Driver Kit
      shell: pwsh
      run: |
        $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2128854"
        $wdkInstaller = "$env:RUNNER_TEMP\\wdksetup.exe"
        curl.exe -L $wdkUrl -o $wdkInstaller
        Start-Process -FilePath $wdkInstaller -ArgumentList "/quiet" -Wait

    # ---------------------------------------------------------
    # Auto‑filter and build .sln files (deny‑list)
    # ---------------------------------------------------------
    - name: Build Visual Studio projects
      shell: pwsh
      run: |
        $deny = @(
          "CUDA pointerscan",
          "Direct x mess",
          "DotNetCompiler",
          "DotNetDataCollector",
          "DotNetInvasiveDataCollector",
          "Java\\CEJVMTI",
          "lua53\\lua53\\vs2013",
          "MonoDataCollector",
          "plugin\\c# template",
          "plugin\\example-c",
          "plugin\\QWS",
          "tcclib\\win32\\tcc",
          "lua\\mak.vs2005",
          "lua\\mak.vs2008",
          "ultimap2",
          "DBKKernel"
        )

        Get-ChildItem -Recurse -Filter *.sln | ForEach-Object {
          $path = $_.FullName
          foreach ($bad in $deny) {
            if ($path -like "*$bad*") { continue 2 }
          }
          msbuild $path /p:Configuration=$env:CONFIG /m
        }

    # ---------------------------------------------------------
    # Build Lazarus projects (.lpi) — Win64 only + deny‑list
    # ---------------------------------------------------------
    - name: Build Lazarus projects
      shell: pwsh
      run: |
        $env:PATH = "C:\lazarus\fpc\3.2.2\bin\x86_64-win64;$env:PATH"
        $lazbuild = "C:\Lazarus\lazbuild.exe"

        $denyLPI = @(
          "cecore.lpi",
          "ceregreset.lpi",
          "Kernelmoduleunloader.lpi",
          "standalonephase2.lpi",
          "speedhack.lpi"
        )

        Get-ChildItem -Recurse -Filter *.lpi | ForEach-Object {
          $path = $_.FullName
          foreach ($bad in $denyLPI) {
            if ($path -like "*$bad*") { continue 2 }
          }
          & $lazbuild --cpu=x86_64 --os=win64 --build-all $path
        }

    # ---------------------------------------------------------
    # Create portable ZIP
    # ---------------------------------------------------------
    - name: Create portable ZIP
      shell: pwsh
      run: |
        $out = "$env:RUNNER_TEMP\\CheatEnginePortable"
        New-Item -ItemType Directory -Path $out | Out-Null

        Copy-Item -Recurse -Force "Cheat Engine\bin" $out

        $zip = "$env:RUNNER_TEMP\\CheatEnginePortable.zip"
        Compress-Archive -Path $out -DestinationPath $zip -Force

        echo "PORTABLE_ZIP=$zip" >> $env:GITHUB_ENV

    # ---------------------------------------------------------
    # Upload artifacts
    # ---------------------------------------------------------
    - name: Upload portable build
      uses: actions/upload-artifact@v4
      with:
        name: cheat-engine-portable
        path: ${{ env.PORTABLE_ZIP }}
