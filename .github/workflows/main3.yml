name: Cheat Engine (auto‑filtered full build)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      CONFIG: Release

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # ---------------------------------------------------------
    # Install Lazarus + FPC (curl + PS7-safe EXE check)
    # ---------------------------------------------------------
    - name: Install Lazarus + FPC
      shell: pwsh
      run: |
        $url = "https://sourceforge.net/projects/lazarus/files/Lazarus%20Windows%2064%20bits/Lazarus%203.4/lazarus-3.4-fpc-3.2.2-win64.exe/download"
        $installer = "$env:RUNNER_TEMP\\lazarus_installer.exe"

        curl.exe -L $url -o $installer

        $bytes = [System.IO.File]::ReadAllBytes($installer)[0..1]
        if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
          Write-Error "Installer is not a valid EXE (missing MZ header)"
          exit 1
        }

        Start-Process -FilePath $installer -ArgumentList "/VERYSILENT" -Wait

    # ---------------------------------------------------------
    # Install Windows Driver Kit (WDK)
    # ---------------------------------------------------------
    - name: Install Windows Driver Kit
      shell: pwsh
      run: |
        $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2128854"
        $wdkInstaller = "$env:RUNNER_TEMP\\wdksetup.exe"
        curl.exe -L $wdkUrl -o $wdkInstaller
        Start-Process -FilePath $wdkInstaller -ArgumentList "/quiet" -Wait

    # ---------------------------------------------------------
    # Auto‑filter and build .sln files (deny‑list)
    # ---------------------------------------------------------
    - name: Auto‑filter and build .sln files
      shell: pwsh
      run: |
        # These projects cannot be built on GitHub Actions
        $deny = @(
          "CUDA pointerscan",
          "Direct x mess",
          "DotNetCompiler",
          "DotNetDataCollector",
          "DotNetInvasiveDataCollector",
          "Java\\CEJVMTI",
          "lua53\\lua53\\vs2013",
          "MonoDataCollector",
          "plugin\\c# template",
          "plugin\\example-c",
          "plugin\\QWS",
          "tcclib\\win32\\tcc",
          "lua\\mak.vs2005",
          "lua\\mak.vs2008",
          "ultimap2",
          "DBKKernel"
        )

        $solutions = Get-ChildItem -Recurse -Filter *.sln
        $buildable = @()

        foreach ($sln in $solutions) {
          $path = $sln.FullName

          foreach ($bad in $deny) {
            if ($path -like "*$bad*") {
              Write-Warning "Skipping legacy/unsupported solution: $path"
              continue 2
            }
          }

          Write-Host "✓ Marked as buildable: $path"
          $buildable += $path
        }

        Write-Host "=== Buildable solutions ==="
        $buildable | ForEach-Object { Write-Host $_ }

        foreach ($sln in $buildable) {
          Write-Host "Building $sln"
          msbuild $sln /p:Configuration=$env:CONFIG /m
        }

    # ---------------------------------------------------------
    # Build Lazarus projects (.lpi)
    # ---------------------------------------------------------
    - name: Build Lazarus projects
      shell: pwsh
      run: |
        $lazbuild = "C:\\Lazarus\\lazbuild.exe"
        Get-ChildItem -Recurse -Filter *.lpi | ForEach-Object {
          Write-Host "Building Lazarus project $($_.FullName)"
          & $lazbuild --build-all $($_.FullName)
        }

    # ---------------------------------------------------------
    # Install Inno Setup
    # ---------------------------------------------------------
    - name: Install Inno Setup
      shell: pwsh
      run: |
        $url = "https://files.jrsoftware.org/is/6/innosetup-6.2.2.exe"
        $installer = "$env:RUNNER_TEMP\\is.exe"
        curl.exe -L $url -o $installer
        Start-Process -FilePath $installer -ArgumentList "/VERYSILENT" -Wait

    # ---------------------------------------------------------
    # Build installer
    # ---------------------------------------------------------
    - name: Build installer
      shell: pwsh
      run: |
        $iss = "Cheat Engine\\installer\\CheatEngine.iss"
        & "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe" $iss

    # ---------------------------------------------------------
    # Upload artifacts
    # ---------------------------------------------------------
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cheat-engine-auto-filtered-build
        path: |
          Cheat Engine/bin
          Cheat Engine/installer/Output
          **/*.exe
          **/*.dll
          **/*.sys
